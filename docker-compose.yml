services:
  postgres:
    image: postgres:17
    container_name: hltv-historical-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "HLTV-Historical-Data"
      POSTGRES_USER: hltv
      POSTGRES_PASSWORD: hltv
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - hltv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hltv -d HLTV-Historical-Data"]
      interval: 5s
      timeout: 3s
      retries: 5

  scraper:
    build: .
    container_name: hltv-scraper
    restart: "no"
    profiles: ["scraper"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HLTV_DB_HOST: postgres
      HLTV_DB_PORT: "5432"
      HLTV_DB_NAME: "HLTV-Historical-Data"
      HLTV_DB_USER: hltv
      HLTV_DB_PASSWORD: hltv
    volumes:
      - ./data:/app/data
      - ./proxies.txt:/app/proxies.txt:ro
    command: ["sh", "-c", "Xvfb :99 -screen 0 1280x900x24 -nolisten tcp & sleep 1 && exec hltv-scraper --proxy-file proxies.txt --workers 2 --concurrent-tabs 1 --no-save-html --skip-discovery"]

volumes:
  hltv_pgdata:
